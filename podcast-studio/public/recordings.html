<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recordings — PodcastStudio</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #060810;
            --bg2: #0d1117;
            --surface: #111827;
            --border: #1f2937;
            --accent: #f97316;
            --green: #22c55e;
            --red: #ef4444;
            --blue: #3b82f6;
            --text: #f1f5f9;
            --muted: #64748b;
            --card: #0f1623;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(249, 115, 22, .1), transparent);
            pointer-events: none
        }

        nav {
            padding: 1.25rem 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: rgba(6, 8, 16, .9)
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: .5rem;
            text-decoration: none;
            color: var(--text)
        }

        .logo-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent)
        }

        .back-link {
            font-size: .85rem;
            font-weight: 700;
            color: var(--muted);
            text-decoration: none;
            transition: color .2s;
            font-family: 'Syne', sans-serif;
            letter-spacing: .05em
        }

        .back-link:hover {
            color: var(--accent)
        }

        main {
            flex: 1;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 4rem 2rem;
            position: relative;
            z-index: 1
        }

        .page-title {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -.03em;
            margin-bottom: .5rem
        }

        .page-sub {
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            font-size: 1rem;
            margin-bottom: 3rem
        }

        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 0;
            color: var(--muted)
        }

        .loader-spinner {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            animation: spin 1s linear infinite;
            margin-bottom: 1rem
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .empty-state {
            text-align: center;
            padding: 5rem 2rem;
            background: var(--card);
            border: 1px dashed var(--border);
            border-radius: 12px;
            display: none;
            flex-direction: column;
            align-items: center
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--muted)
        }

        .empty-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: .5rem
        }

        .empty-sub {
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            font-size: .9rem;
            margin-bottom: 2rem
        }

        .empty-btn {
            padding: .75rem 2rem;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            text-decoration: none;
            transition: all .2s
        }

        .empty-btn:hover {
            background: #fb923c;
            transform: translateY(-2px)
        }

        .sessions-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem
        }

        .session-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all .2s
        }

        .session-card:hover {
            border-color: var(--accent)
        }

        .session-header {
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer
        }

        .sh-left {
            display: flex;
            flex-direction: column;
            gap: .5rem
        }

        .sh-title {
            font-size: 1.25rem;
            font-weight: 700
        }

        .sh-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: .8rem;
            color: var(--muted);
            font-family: 'DM Mono', monospace
        }

        .sh-id {
            padding: .15rem .5rem;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--accent);
            font-weight: 700
        }

        .sh-host {
            display: flex;
            align-items: center;
            gap: .35rem
        }

        .sh-right {
            display: flex;
            align-items: center;
            gap: 1.5rem
        }

        .sh-status {
            padding: .25rem .75rem;
            border-radius: 20px;
            font-size: .7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .1em;
            border: 1px solid currentColor
        }

        .sh-status.waiting {
            color: #f59e0b;
            background: rgba(245, 158, 11, .1)
        }

        .sh-status.live {
            color: var(--blue);
            background: rgba(59, 130, 246, .1)
        }

        .sh-status.recording {
            color: var(--red);
            background: rgba(239, 68, 68, .1)
        }

        .sh-status.completed {
            color: var(--green);
            background: rgba(34, 197, 94, .1)
        }

        .sh-expand {
            font-size: 1.5rem;
            color: var(--muted);
            transition: transform .3s
        }

        .session-card.expanded .sh-expand {
            transform: rotate(180deg)
        }

        .session-body {
            display: none;
            padding: 0 1.5rem 1.5rem;
            border-top: 1px solid var(--border);
            background: var(--bg2)
        }

        .session-card.expanded .session-body {
            display: block
        }

        .recordings-list {
            display: flex;
            flex-direction: column;
            gap: .5rem;
            margin-top: 1.5rem
        }

        .rec-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: all .2s
        }

        .rec-row:hover {
            border-color: rgba(249, 115, 22, .4)
        }

        .rec-left {
            display: flex;
            align-items: center;
            gap: .75rem
        }

        .rec-icon {
            font-size: 1.5rem;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            border-radius: 8px;
            border: 1px solid var(--border)
        }

        .rec-info {
            display: flex;
            flex-direction: column;
            gap: .25rem
        }

        .rec-name {
            font-weight: 700;
            font-size: .9rem
        }

        .rec-meta {
            font-size: .75rem;
            color: var(--muted);
            font-family: 'DM Mono', monospace
        }

        .rec-right {
            display: flex;
            align-items: center;
            gap: 1rem
        }

        .rec-size {
            font-size: .75rem;
            color: var(--muted);
            font-family: 'DM Mono', monospace
        }

        .rec-dl {
            padding: .5rem 1rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: .75rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            text-decoration: none;
            transition: all .2s;
            display: flex;
            align-items: center;
            gap: .35rem
        }

        .rec-dl:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        .rec-loader {
            padding: 2rem;
            text-align: center;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            font-size: .85rem
        }

        .rec-empty {
            padding: 2rem;
            text-align: center;
            color: var(--muted);
            background: rgba(255, 255, 255, .02);
            border-radius: 8px;
            border: 1px dashed var(--border);
            font-family: 'DM Mono', monospace;
            font-size: .85rem;
            margin-top: 1.5rem
        }
    </style>
</head>

<body>

    <nav>
        <a href="/" class="logo">
            <div class="logo-dot"></div>PodcastStudio
        </a>
        <a href="/" class="back-link">← Back to Studio</a>
    </nav>

    <main>
        <h1 class="page-title">Recordings</h1>
        <p class="page-sub">// Your session archives and downloadable tracks</p>

        <div class="loader" id="main-loader">
            <div class="loader-spinner"></div>
            <div>Loading sessions...</div>
        </div>

        <div class="empty-state" id="empty-state">
            <div class="empty-icon">📁</div>
            <div class="empty-title">No recordings yet</div>
            <div class="empty-sub">Start your first session to capture some magic.</div>
            <a href="/" class="empty-btn">Start a Session</a>
        </div>

        <div class="sessions-list" id="sessions-list"></div>
    </main>

    <script>
        async function loadSessions() {
            try {
                const res = await fetch('/api/sessions');
                const sessions = await res.json();

                document.getElementById('main-loader').style.display = 'none';

                if (!sessions || sessions.length === 0) {
                    document.getElementById('empty-state').style.display = 'flex';
                    return;
                }

                const list = document.getElementById('sessions-list');
                sessions.forEach(s => {
                    const card = document.createElement('div');
                    card.className = 'session-card';
                    card.dataset.id = s.id;

                    const date = new Date(s.created_at).toLocaleDateString(undefined, {
                        month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit'
                    });

                    card.innerHTML = `
        <div class="session-header" onclick="toggleSession('${s.id}')">
          <div class="sh-left">
            <div class="sh-title">${s.title}</div>
            <div class="sh-meta">
              <span class="sh-id">${s.id}</span>
              <span class="sh-host">🎙️ Hosted by ${s.host_name}</span>
              <span>🕒 ${date}</span>
            </div>
          </div>
          <div class="sh-right">
            <div class="sh-status ${s.status}">${s.status}</div>
            <div class="sh-expand">↓</div>
          </div>
        </div>
        <div class="session-body" id="body-${s.id}">
          <div class="rec-loader" id="loader-${s.id}">Loading recordings...</div>
          <div class="recordings-list" id="recs-${s.id}"></div>
        </div>
      `;
                    list.appendChild(card);
                });
            } catch (err) {
                document.getElementById('main-loader').innerHTML = `<div style="color:var(--red)">Failed to load sessions</div>`;
            }
        }

        async function toggleSession(id) {
            const card = document.querySelector(`.session-card[data-id="${id}"]`);
            const isExpanded = card.classList.contains('expanded');

            // Collapse all
            document.querySelectorAll('.session-card').forEach(c => c.classList.remove('expanded'));

            if (!isExpanded) {
                card.classList.add('expanded');
                loadRecordings(id);
            }
        }

        async function loadRecordings(id) {
            const listEl = document.getElementById(`recs-${id}`);
            const loaderEl = document.getElementById(`loader-${id}`);

            listEl.innerHTML = '';
            loaderEl.style.display = 'block';

            try {
                const res = await fetch(`/api/sessions/${id}/recordings`);
                const recordings = await res.json();

                loaderEl.style.display = 'none';

                if (!recordings || recordings.length === 0) {
                    listEl.innerHTML = `<div class="rec-empty">No recordings found for this session.</div>`;
                    return;
                }

                recordings.forEach(r => {
                    const isCombined = r.type === 'combined';
                    const icon = isCombined ? '🎬' : '🎙️';
                    const typeLabel = isCombined ? 'Combined Session' : 'Individual Track';
                    const sizeMB = (r.filesize / (1024 * 1024)).toFixed(1);

                    const row = document.createElement('div');
                    row.className = 'rec-row';
                    row.innerHTML = `
        <div class="rec-left">
          <div class="rec-icon">${icon}</div>
          <div class="rec-info">
            <div class="rec-name">${r.participant_name}</div>
            <div class="rec-meta">${typeLabel} • .webm</div>
          </div>
        </div>
        <div class="rec-right">
          <div class="rec-size">${sizeMB} MB</div>
          <a href="${r.url}" download class="rec-dl">⬇ Download</a>
        </div>
      `;
                    listEl.appendChild(row);
                });
            } catch (err) {
                loaderEl.innerHTML = `<span style="color:var(--red)">Failed to load recordings</span>`;
            }
        }

        // Load on start
        loadSessions();
    </script>
</body>

</html>
